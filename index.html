<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="A hands-on staged curriculum for building a Python service on AWS ECS Fargate with Terraform, Redis, PostgreSQL, CI/CD, security, and observability.">
  <title>AWS DevOps Quest</title>
  <link rel="manifest" href="app.webmanifest">

</head>
<body>

  <div id="toast" class="toast" aria-live="polite"></div>

      navigator.serviceWorker.getRegistrations().then(registrations => registrations.forEach(registration => registration.unregister()));
    }
  </script>

  <script src="app.js"></script>
</body>
</html>
